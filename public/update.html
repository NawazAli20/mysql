<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Add a new student information</h1>
    <form action="/update" method="post">
        <label for="id">ID:</label>
        <input type="number" name="id" id="id" placeholder="Enter your ID">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name">
        <label for="credit">Total Credit:</label>
        <input type="number" name="tot_credit" id="credit" placeholder="Enter your total credit">
        <button type="submit">Submit</button>
    </form>
</body>
</html>
